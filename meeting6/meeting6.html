<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meeting6</title>
    
</head>
<body>
    <!-- tata guna hyperlink --> 
    <!-- href = hypertext reference -->
     <a href="url">text yang menuju ke link</a>
    <!-- Contoh penggunaan hyperlink -->
     <a href="https://www.youtube.com/watch?v=xMHJGd3wwZk">click me!</a>

    <!-- Atribut Target -->
    <!-- hypertext reference biasa tanpa title -->
    <!-- Contoh: -->
     <a href="https://www.youtube.com/watch?v=xMHJGd3wwZk">click me!</a>

    <!-- Atribut Title -->
    <!-- hypertext reference yang menambahkan teks ketika cursor hover di atas link seperti tooltip -->
    <!-- Contoh: -->
     <a href="https://mail.google.com/" title="email totimedoor@gmail.com">Send Email</a>

    <!-- Absolute URL -->
    <!-- Alamat URL lengkap yang biasanya digunakan untuk menuju ke website lain. Penggunaan 'www' opsional. -->
    <!-- Contoh: -->
     <a href="https://www.youtube.com"></a>
     <a href="https://youtube.com"></a>

    <!-- Relative URL -->
    <!-- Alamat path & nama file menuju ke halaman website yang berbeda dalam satu website -->
    <!-- Contoh: -->
     <a href="meeting6.html"></a>
     <a href="'Do it Your Self!'/DIYS1/artikelMakanan.html"></a>

    <!-- Anchor Links -->
    <!-- Anchor Link ada cara untuk menautkan link be bagian tertenu di halaman webiste yang sama. -->
    <!-- Contoh: -->
     <a href="#price">Price</a>

    <!-- Contoh elemen yang menggunakan id price -->
     <section id="price"></section>

</body>
</html>
