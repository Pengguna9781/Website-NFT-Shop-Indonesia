<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meeting5</title>
    <link rel="stylesheet" href="meeting5.css">
</head>
<body>
    <!-- Unordered List -->
    <h3> Names of Heroes in Marvel </h3>
    <ul>
        <li> Thor </li>
        <li> Captain America </li>
        <li> Ant Man </li>
    </ul>
    <!-- Kamu juga bisa mengubah tipe simbol pada unordered list dengan menambahkan atribut type.  -->
    <ul type="square"></ul>
    <ul type="circle"></ul>
    <ul type="disc"></ul>

    <h3> Daftar Film Marvel Sesuai tahun Rilis</h3>
    <!-- Ordered List -->
    <ol>
        <li> Captain Marvel </li>
        <li> Avengers: End Game </li>
        <li> Spider-Man: Far From Home </li>
        <li> Eternals </li>
        <li> Thunderbolts </li>
        <li> Spider-Man: Brand New Day </li>
    </ol>
    <!-- Mengubah Tipe Ordered List -->
    <!-- Abjad -->
    <ol type="A"></ol> 
    <!-- Nomor -->
    <ol type="1"></ol>
    <!-- Angka Romawi -->
    <ol type="I"></ol>

    <!-- Button -->
     <!-- Untuk melihat code hiasan, sila lihat file 'meeting5.css' -->
    <button>Default Button</button>
</body>
</html>
