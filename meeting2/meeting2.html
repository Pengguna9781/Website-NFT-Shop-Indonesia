<!-- INLINE CSS -->
    <!-- INLINE CSS adalah atribut style yang langsung ditambahkan ke dalam tag HTML tertentu -->
     <!-- Contoh: -->
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>meeting2</title>
    </head>
    <body>
        <script src="meeting.2"></script>
        <p style="color: red">Contoh Inline CSS</p>
    </body>
    </html>

<!-- Internal CSS -->
    <!-- Internal CSS adalah style CSS yang ditulis didalm tag style yang ditambahkan pada tag <head> -->
    <!-- Contoh: -->
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            h1 {
                color: green;
            }
        </style>
    </head>
    <body>
       <header>
            <h1>Hello World</h1>
       </header> 
    </body>
    </html>

<!-- Contoh HTML, CSS box model -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <p class="first">First Paragraph</p>
    <p class="second">Second Paragraph</p>
 </body>
 </html>

<!-- ID selector -->
    <!-- ID selector menunjuk pada atribut id yang ditambahkan pada tag. Biasanya digunakan untuk pembagian section, pemakaian nama bebas namun didepannya tidak boleh angka -->
    <!-- ID selector dapat dipanggil dengan href -->
    <!-- Contoh id selector: -->
     <h2 id="demo">ID Selector Example</h2>
    <!-- Contoh pemanggilan id selector -->
     <a href="#demo">ID Selector caller</a>

<!-- Class selector-->
    <!-- Class selector merujuk pada atribut class yang ditambahkan pada tag. 
     Class selecotr mirip dengan ID selector tetapi lebih fleksibel dan memiliki lebih banyak penggunaanya.
     Biasanya dipakai untuk javascript dan styling css
     Contoh umumnya sebagai -->
     <h2 class="important">Class Selector</h2>
     <!-- Contoh pemanggilan Javascript: -->
      (blm dibuat)
     <!-- Contoh pemanggilan CSS: -->
      h2.important{
        isi
      }
